<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ffe4ef">
<title>うしぽこ 🐄</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;   /* タップ時の灰色ハイライト除去 */
    -webkit-touch-callout: none;                /* 絵文字などの長押しメニュー防止 */
  }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, "Hiragino Maru Gothic ProN", "Hiragino Sans", sans-serif;
    background: linear-gradient(160deg, #fff0f6 0%, #eaf7ff 55%, #eafff0 100%);
    color: #5a4a52;
    min-height: 100%;
    -webkit-user-select: none; user-select: none;   /* 連打時のテキスト選択防止 */
    overscroll-behavior: none;
    touch-action: manipulation;   /* 背景・隙間へのダブルタップズームも無効化 */
  }
  #app {
    max-width: 440px;
    margin: 0 auto;
    padding: 16px 16px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    min-height: 100vh;
  }
  .title-row { width: 100%; position: relative; display: flex; align-items: center; justify-content: center; }
  .title {
    font-size: 22px; font-weight: 800; letter-spacing: .04em;
    color: #ff8fb1; margin: 6px 0 0;
  }
  .zukan-btn {
    position: absolute; right: 0; top: 50%; transform: translateY(-50%);
    min-height: 44px; border: none; border-radius: 16px; padding: 0 12px;
    font-family: inherit; font-weight: 800; font-size: 13px; color: #fff;
    background: linear-gradient(135deg,#c9a7f0,#a98ae0);
    box-shadow: 0 4px 0 rgba(0,0,0,0.07); cursor: pointer; touch-action: manipulation;
  }
  .zukan-btn:active { transform: translateY(calc(-50% + 2px)); box-shadow: 0 2px 0 rgba(0,0,0,0.07); }

  /* カード共通 */
  .card {
    width: 100%;
    background: rgba(255,255,255,0.72);
    border-radius: 26px;
    padding: 16px 18px;
    box-shadow: 0 6px 18px rgba(255,170,200,0.25);
  }

  /* 上部ステータス */
  .status { display: flex; flex-direction: column; gap: 10px; }
  .money-row { display: flex; align-items: baseline; justify-content: space-between; }
  .money-label { font-size: 13px; color: #b89aa6; font-weight: 700; }
  .money-val { font-size: 26px; font-weight: 800; color: #ff9a3d; }
  .seri {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    background: #fff6fa; border-radius: 18px; padding: 8px 12px;
    font-size: 15px; font-weight: 700; color: #7a6a72;
  }

  /* 牛房グリッド（スマホ幅で2列×3段）*/
  .grid {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    touch-action: pan-y;   /* 縦スクロールのみ許可・ピンチ/ダブルタップ無効。複数指のpointerdownを各カードへ個別配送 */
  }
  .slot {
    position: relative;   /* 紙吹雪オーバーレイの基準 */
    background: rgba(255,255,255,0.72);
    border-radius: 22px;
    padding: 12px 10px;
    min-height: 198px;
    display: flex; flex-direction: column; align-items: center; gap: 7px;
    box-shadow: 0 5px 14px rgba(255,170,200,0.22);
    touch-action: manipulation;   /* ダブルタップズーム無効化 */
  }
  .slot.locked { background: rgba(246,241,245,0.6); box-shadow: none; }
  /* 押せるカード（空き／解放可）＝カード全体を押下でぷにっと縮む。購入トリガーは click のまま */
  .slot.pressable { transition: transform .1s ease; }
  .slot.pressable:active { transform: scale(0.97); }

  /* レア度色（共通）*/
  .r-normal { background:#eef3f7; color:#8aa0b2; }
  .r-good   { background:#e4f7ea; color:#4bb373; }
  .r-great  { background:#e6efff; color:#5b8bef; }
  .r-legend { background:linear-gradient(90deg,#fff0c2,#ffd6ec); color:#d98a2b; box-shadow:0 0 0 2px #ffe27a inset; }

  .s-top {
    font-size: 11px; font-weight: 800; color: #9a86c9;
    background: #f1ecff; border-radius: 999px; padding: 4px 12px;
    white-space: nowrap;
  }
  .s-top.muted { color: #b6a8c2; background: #efeaf3; }

  .s-emoji { font-size: 56px; line-height: 1.05; margin-top: 2px; touch-action: manipulation; }
  .s-emoji.tap {
    cursor: pointer;
    transition: transform .08s ease;
    filter: drop-shadow(0 6px 8px rgba(180,150,200,0.3));
  }
  .s-emoji.tap:active { transform: scale(0.86) rotate(-5deg); }
  .s-emoji.plus { color: #ff9ec4; font-weight: 800; cursor: pointer; text-shadow: 0 2px 5px rgba(255,140,180,0.45); }   /* 「＋」を押せる見た目に（浮遊シャドウ） */
  .s-emoji.lock { opacity: .5; filter: grayscale(.3); }

  .s-mid {
    font-size: 11px; font-weight: 800; padding: 2px 10px; border-radius: 999px;
    min-height: 18px; display: flex; align-items: center; white-space: nowrap;
  }
  .s-mid.plain { background: transparent; color: #c3b3bc; font-weight: 700; }

  .s-bar { width: 100%; height: 10px; background: #f0e6ec; border-radius: 999px; overflow: hidden; }
  .s-bar.hidden { visibility: hidden; }
  .s-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg,#ffd36e,#ff9ec4,#a0d8ff);
    border-radius: 999px; transition: width .3s ease;
  }

  .s-btn {
    width: 100%; min-height: 44px;
    border: none; border-radius: 14px;
    font-family: inherit; font-size: 13px; font-weight: 800;
    color: #fff; cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.07);
    transition: transform .06s ease; touch-action: manipulation;
    padding: 0 6px;
  }
  .s-btn:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.07); }
  .s-btn.adopt { background: linear-gradient(135deg,#ffb0cf,#ff8fb1); }
  .s-btn.ship  { background: linear-gradient(135deg,#9ad0ff,#6fb5f6); }
  .s-btn.buy   { background: linear-gradient(135deg,#ffd98a,#ffb86b); }
  .s-btn:disabled { background: #e2dbe0; color:#b6acb2; box-shadow: 0 4px 0 rgba(0,0,0,0.04); cursor: default; }

  /* なでた手応え（フローティングテキスト）*/
  .floaty {
    position: fixed;
    transform: translate(-50%, -50%);
    font-size: 22px; font-weight: 800; color: #ff6fa2;
    text-shadow: 0 1px 3px rgba(255,255,255,0.9);
    pointer-events: none; z-index: 60; white-space: nowrap;
    opacity: 1;
    transition: transform .8s ease-out, opacity .8s ease-out;
    will-change: transform, opacity;
  }
  .floaty.small { font-size: 17px; color: #a9a2b8; }
  .floaty.go { transform: translate(-50%, -50%) translateY(-52px); opacity: 0; }

  /* トースト */
  #toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
    background: rgba(90,74,82,0.92); color: #fff; font-weight: 700; font-size: 15px;
    padding: 12px 20px; border-radius: 999px; opacity: 0; pointer-events: none;
    transition: opacity .25s ease, transform .25s ease; max-width: 90%; text-align:center;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* おかえりモーダル */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background: rgba(120,100,110,0.35);
    -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
  }
  .modal-overlay[hidden] { display: none; }
  .modal-card {
    width: 100%; max-width: 320px;
    background: rgba(255,255,255,0.97);
    border-radius: 28px;
    padding: 24px 22px 20px;
    box-shadow: 0 12px 34px rgba(200,150,180,0.4);
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    animation: pop .25s ease-out;
  }
  @keyframes pop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-emoji { font-size: 64px; line-height: 1.05; }
  .modal-title { font-size: 22px; font-weight: 800; color: #ff8fb1; }
  .modal-away { font-size: 14px; font-weight: 700; color: #b89aa6; }
  .modal-lines { display: flex; flex-direction: column; gap: 6px; width: 100%; margin: 6px 0 8px; }
  .modal-line {
    font-size: 15px; font-weight: 800; color: #6a5a62;
    background: #fff6fa; border-radius: 14px; padding: 10px 12px;
  }
  #wClose, #sClose, #zClose, #fClose { max-width: 200px; }

  /* 牛ずかん */
  .zukan-card { max-width: 344px; padding: 20px 12px 16px; }
  .z-grid { width: 100%; display: flex; flex-direction: column; gap: 4px; margin: 6px 0 10px; }
  .z-row { display: grid; grid-template-columns: 52px repeat(5, 1fr); gap: 4px; align-items: stretch; }
  .z-col {
    font-size: 10px; font-weight: 800; color: #b89aa6;
    display: flex; align-items: center; justify-content: center; min-height: 18px;
  }
  .z-label {
    font-size: 9px; font-weight: 800; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; padding: 2px; white-space: nowrap;
  }
  .z-cell {
    background: #f4eef2; border: 2px solid transparent; border-radius: 10px;
    min-height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; color: #cdbcc6; cursor: default;
    touch-action: manipulation;
  }
  .z-cell.done { background: #fff; cursor: pointer; box-shadow: 0 2px 6px rgba(255,170,200,0.25); }
  .z-cell.none { background: transparent; box-shadow: none; font-size: 14px; opacity: .45; }   /* 達成不可能マス（でんせつ☆1）の空欄 */
  .z-emoji { font-size: 16px; line-height: 1.1; }
  .z-sub { font-size: 8px; font-weight: 800; color: #8a7480; line-height: 1.3; }
  /* 額縁（装飾のみ・効果なし） */
  .z-cell.f1 { border-color: #b98a54; background: #faf0e2; }
  .z-cell.f2 { border-color: #a8b2bd; background: #f2f5f9; }
  .z-cell.f3 { border-color: #e6bc4a; background: #fff7dd; box-shadow: 0 0 0 1px #ffe27a inset, 0 2px 8px rgba(230,180,90,0.35); }
  #frameMenu { z-index: 210; }   /* ずかんの上に重ねる */
  .z-new { color: #7a5fb0; background: #f1ecff; }

  /* 出荷ボタン＋ごはんボタンの行（横並びで分離。ラベルと重ならない） */
  .s-btnrow { width: 100%; display: flex; gap: 6px; align-items: stretch; }
  .s-btnrow .s-btn { flex: 1 1 auto; min-width: 0; }
  /* ごはんボタン（出荷ボタンの右横・現在のごはん表示を兼ねる） */
  .feed-btn {
    flex: 0 0 auto; width: 44px; min-height: 44px; padding: 0;
    border: none; border-radius: 14px;
    font-family: inherit; font-size: 16px; line-height: 1;
    cursor: pointer; touch-action: manipulation;
    display: flex; align-items: center; justify-content: center;
    background: #f3edf1; box-shadow: 0 2px 6px rgba(200,160,180,0.25);
  }
  .feed-btn:active { transform: scale(.92); }
  .feed-btn.f0 { filter: grayscale(.7); opacity: .75; }          /* ふつう（無料） */
  .feed-btn.f1 { background: #fff3df; filter: none; opacity: 1; } /* いいごはん */
  .feed-btn.f2 {                                                  /* さいこうのごはん */
    background: linear-gradient(135deg,#fff3c4,#ffe9a8);
    box-shadow: 0 0 0 2px #ffe27a inset, 0 2px 6px rgba(230,180,90,0.35);
    filter: none; opacity: 1; font-size: 13px;
  }

  /* サシ度☆5の豪華演出 */
  .sashi-max .modal-card {
    background: linear-gradient(160deg,#fffaf0,#fff2f8);
    box-shadow: 0 0 0 3px #ffe27a, 0 12px 34px rgba(220,170,90,0.5);
  }
  .sashi-max .modal-title { color: #e0982a; }
  .sashi-max #sSashi { color: #d98a2b; background: #fff6e6; }
  .sashi-max .modal-emoji { animation: sparkle .8s ease-in-out infinite alternate; }
  @keyframes sparkle {
    from { transform: scale(1);    filter: drop-shadow(0 0 1px #ffe27a); }
    to   { transform: scale(1.14); filter: drop-shadow(0 0 9px #ffd54a); }
  }

  /* お迎えガチャ演出 */
  .slot.gacha-gold {   /* すごい/でんせつの告知：ほんのり金色 */
    background: linear-gradient(160deg,#fff8e3,#ffedc9);
    box-shadow: 0 0 0 2px #ffe27a, 0 5px 14px rgba(230,180,90,0.35);
  }
  @keyframes truck-shake { from { transform: translateX(-3px) rotate(-2deg); } to { transform: translateX(3px) rotate(2deg); } }
  .s-emoji.gacha-truck { animation: truck-shake .18s ease-in-out infinite alternate; }
  @keyframes gacha-bounce { 0%,100% { transform: translateY(0) scale(1); } 40% { transform: translateY(-14px) scale(1.06); } }
  .s-emoji.gacha-silhouette {
    animation: gacha-bounce .5s ease-in-out infinite;   /* .5s×2周 ≒ 1.0秒で2回バウンド */
    filter: grayscale(1) brightness(.35);               /* シルエット */
  }
  @keyframes gacha-pop { 0% { transform: scale(.3); opacity: .2; } 60% { transform: scale(1.18); } 100% { transform: scale(1); opacity: 1; } }
  .s-emoji.gacha-pop { animation: gacha-pop .5s ease-out; }
  .confetti { position: absolute; inset: 0; overflow: hidden; border-radius: 22px; pointer-events: none; }
  .confetti i {
    position: absolute; top: -10px; width: 7px; height: 11px; border-radius: 2px;
    animation: confetti-fall 1.6s ease-in forwards;
  }
  @keyframes confetti-fall { to { transform: translateY(220px) rotate(540deg); opacity: 0; } }
  .legend-pop {
    position: fixed; left: 50%; top: 34%; z-index: 150;
    transform: translate(-50%,-50%) scale(.8);
    background: linear-gradient(135deg,#fff3c4,#ffd6ec); color: #c07a1a;
    font-weight: 800; font-size: 16px; padding: 12px 20px; border-radius: 999px;
    box-shadow: 0 6px 20px rgba(220,170,90,.45);
    opacity: 0; transition: opacity .25s ease, transform .25s ease;
    pointer-events: none; white-space: nowrap;
  }
  .legend-pop.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }

  .hint { font-size: 12px; color: #c3b3bc; text-align: center; }
</style>
</head>
<body>
<div id="app">
  <div class="title-row">
    <div class="title">うしぽこ 🐄</div>
    <button class="zukan-btn" id="zukanBtn" type="button">ずかん📖</button>
  </div>

  <div class="card status">
    <div class="money-row">
      <span class="money-label">おさいふ</span>
      <span class="money-val" id="money">0 G</span>
    </div>
    <div class="seri" id="seri">今日のセリ：—</div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="hint">牛をなでると育つよ 🖐️　おうちをふやして たくさん育てよう！</div>
</div>
<div id="toast"></div>

<div id="welcome" class="modal-overlay" hidden>
  <div class="modal-card">
    <div class="modal-emoji">🐄</div>
    <div class="modal-title">おかえり！</div>
    <div class="modal-away" id="wAway"></div>
    <div class="modal-lines" id="wLines"></div>
    <button class="s-btn adopt" id="wClose" type="button">ただいま！</button>
  </div>
</div>

<div id="sashi" class="modal-overlay" hidden>
  <div class="modal-card">
    <div class="modal-emoji" id="sEmoji">🥩</div>
    <div class="modal-title" id="sTitle">しゅっか！🎉</div>
    <div class="modal-lines">
      <div class="modal-line" id="sSashi"></div>
      <div class="modal-line" id="sMoney"></div>
      <div class="modal-line z-new" id="sZukan" hidden>📖 ずかんに登録！</div>
    </div>
    <button class="s-btn ship" id="sClose" type="button">やった！</button>
  </div>
</div>

<div id="zukan" class="modal-overlay" hidden>
  <div class="modal-card zukan-card">
    <div class="modal-title">牛ずかん 📖</div>
    <div class="z-grid" id="zGrid"></div>
    <button class="s-btn adopt" id="zClose" type="button">とじる</button>
  </div>
</div>

<div id="frameMenu" class="modal-overlay" hidden>
  <div class="modal-card">
    <div class="modal-emoji">🖼️</div>
    <div class="modal-title" id="fTitle"></div>
    <div class="modal-away" id="fInfo"></div>
    <div class="modal-lines" id="fBtns"></div>
    <button class="s-btn adopt" id="fClose" type="button">とじる</button>
  </div>
</div>

<div id="feedMenu" class="modal-overlay" hidden>
  <div class="modal-card">
    <div class="modal-emoji">🍚</div>
    <div class="modal-title">ごはんをえらぶ</div>
    <div class="modal-away" id="feedInfo"></div>
    <div class="modal-lines" id="feedBtns"></div>
    <button class="s-btn adopt" id="feedClose" type="button">とじる</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ===== 定数 =====
  var SAVE_KEY = "ushiPokoSave_v2";     // 新形式（複数牛房）
  var OLD_KEY  = "ushiIdleSave_v1";     // 旧形式（1頭）
  var START_MONEY = 100000;
  var ADOPT_COST = 30000;               // 子牛の導入価格（据え置き）
  var BASE_PRICE = 50000;               // 出荷基本価格（据え置き）
  var GROW_SECONDS = 600;               // 基本 約10分で100%
  var PET_GAIN = 0.5;                    // なでる：+0.5%
  var PET_COOLDOWN = 500;               // 0.5秒クールダウン
  var MAX_BARNS = 6;                     // 牛房は最大6つ
  // 2つ目以降の牛房の解放価格（index i の牛房 = BARN_PRICES[i-1]）
  var BARN_PRICES = [80000, 200000, 500000, 1200000, 3000000];
  // ごはんグレード（牛1頭ごとの消費型。出荷でリセット＝新しい牛は feed:0）
  // さいこうのごはんは成長+60%に加え、出荷時のサシ度抽選を1段階優遇（☆4以下なら+1）
  var FEED_DEFS = [
    { name: "ふつう",           price: 0,      mult: 1.0, icon: "🍚" },
    { name: "いいごはん",       price: 20000,  mult: 1.3, icon: "🍚" },
    { name: "さいこうのごはん", price: 100000, mult: 1.6, icon: "✨🍚" }
  ];

  // レア度定義（順に判定）
  var RARITIES = [
    { key:"normal", name:"ふつう",   prob:0.60, mult:1.0, cls:"r-normal", face:"🐮", faceBig:"🐄", star:"" },
    { key:"good",   name:"よい",     prob:0.30, mult:1.2, cls:"r-good",   face:"🐮", faceBig:"🐄", star:"✨" },
    { key:"great",  name:"すごい",   prob:0.09, mult:1.5, cls:"r-great",  face:"🐮", faceBig:"🐄", star:"🌟" },
    { key:"legend", name:"でんせつ", prob:0.01, mult:2.0, cls:"r-legend", face:"🐮", faceBig:"🐄", star:"👑" }
  ];
  function rarityByKey(k){ for (var i=0;i<RARITIES.length;i++){ if(RARITIES[i].key===k) return RARITIES[i]; } return RARITIES[0]; }
  function rarityIndex(k){ for (var i=0;i<RARITIES.length;i++){ if(RARITIES[i].key===k) return i; } return 0; }

  // ===== 状態 =====
  // barn = { cow: null | {rarity, growth}, lastPet: number }（成長は state.lastUpdate の時刻差分で計算）
  var state = {
    money: START_MONEY,
    barns: [ { cow:null, lastPet:0 } ],   // 初期は1つ
    seriDate: null,
    seriFactor: 1.0,
    lastUpdate: 0,                         // 成長を時刻差分で計算する基準（エポックms）
    zukan: normZukan(null)                 // 牛ずかん：レア度4×サシ度5=固定20マス（index=レア度番号×5+☆-1）
  };

  // ずかんの正規化：固定20要素。各マスは null（未達成）か
  // { first:初達成エポックms, count:達成回数, best:最高価格, frame:額縁0-3 }
  function normZukan(z) {
    var out = new Array(20);
    for (var i=0;i<20;i++){
      var c = z && z[i];
      out[i] = (c && typeof c === "object" && typeof c.count === "number")
        ? { first: c.first || 0, count: c.count, best: c.best || 0, frame: Math.min(3, Math.max(0, c.frame|0)) }
        : null;
    }
    return out;
  }

  // ===== 保存 / 読み込み・マイグレーション =====
  function save() {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch (e) {}
  }
  function clampGrowth(g){ return Math.max(0, Math.min(100, g)); }
  function normCow(c){
    if (c && typeof c === "object" && typeof c.growth === "number" && c.rarity) {
      // 旧セーブの lastTick は無視（成長は state.lastUpdate 基準）。feed 欠落は 0 に正規化
      return { rarity:c.rarity, growth:clampGrowth(c.growth), feed: Math.min(2, Math.max(0, c.feed|0)) };
    }
    return null;
  }
  function normBarn(b){
    if (!b || typeof b !== "object") return { cow:null, lastPet:0 };
    return { cow: normCow(b.cow), lastPet: b.lastPet || 0 };
  }
  function load() {
    try {
      // 新形式
      var raw = localStorage.getItem(SAVE_KEY);
      if (raw) {
        // v2キーがある＝既にv2利用者。ここで確定し、不正でも v1 には戻さない
        var s = JSON.parse(raw);   // 壊れていれば catch → 初期化
        if (s && typeof s.money === "number" && Array.isArray(s.barns) && s.barns.length >= 1) {
          state.money = s.money;
          state.barns = s.barns.slice(0, MAX_BARNS).map(normBarn);
          state.seriDate = s.seriDate || null;
          state.seriFactor = s.seriFactor || 1.0;
          // lastUpdate が無い旧セーブは now で初期化（過去分の遡及付与はしない）
          state.lastUpdate = (typeof s.lastUpdate === "number") ? s.lastUpdate : Date.now();
          state.zukan = normZukan(s.zukan);   // 旧セーブ（zukanなし）は空ずかん。過去の出荷は遡及しない
          return;
        }
        // v2キーはあるが形が不正 → v1 に戻さず初期化（下へ抜ける）
      } else {
        // v2キーが無い場合のみ 旧形式(v1) → 新形式へマイグレーション（旧1頭を牛房1へ）
        var old = localStorage.getItem(OLD_KEY);
        if (old) {
          var o = JSON.parse(old);
          if (o && typeof o === "object") {
            state.money = (typeof o.money === "number") ? o.money : START_MONEY;
            state.barns = [ { cow: normCow(o.cow), lastPet: o.lastPet || 0 } ];
            state.seriDate = o.seriDate || null;
            state.seriFactor = o.seriFactor || 1.0;
            state.lastUpdate = Date.now();   // 遡及なしで移行
            state.zukan = normZukan(null);
            save();  // 新キーへ保存（以降は新形式で読み込み）
            try { localStorage.removeItem(OLD_KEY); } catch (e2) {}   // 移行完了。旧キーを掃除
            return;
          }
        }
      }
    } catch (e) {}
    // どちらも読めない場合のみ初期化
    state.money = START_MONEY;
    state.barns = [ { cow:null, lastPet:0 } ];
    state.seriDate = null;
    state.seriFactor = 1.0;
    state.lastUpdate = Date.now();
    state.zukan = normZukan(null);
  }

  // ===== セリ係数（日替わり 0.8〜1.2・全牛房共通）=====
  function todayKey() {
    var d = new Date();
    return d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
  }
  function seedRand(str) {
    var h = 2166136261;
    for (var i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
    h = (h >>> 0);
    return (h % 100000) / 100000;
  }
  function refreshSeri() {
    var key = todayKey();
    if (state.seriDate !== key) {
      var r = seedRand("seri-" + key);
      state.seriFactor = Math.round((0.8 + r * 0.4) * 100) / 100;  // 0.80〜1.20
      state.seriDate = key;
    }
  }
  function seriLabel(f) {
    if (f >= 1.15) return "とても高め 📈📈";
    if (f >= 1.05) return "ちょっと高め 📈";
    if (f >  0.95) return "ふつう 🐄";
    if (f >  0.85) return "ちょっと安め 📉";
    return "とても安め 📉📉";
  }

  // ===== 成長段階 =====
  function growthStage(g) {
    if (g < 33)  return { name:"ミルク期 🍼",       small:true };
    if (g < 66)  return { name:"もぐもぐ期 🌱",     small:false };
    if (g < 100) return { name:"むしゃむしゃ期 🌾", small:false };
    return { name:"しゅっか OK！ 🎀", small:false };
  }

  // ===== 抽選・価格 =====
  function rollRarity() {
    var r = Math.random(), acc = 0;
    for (var i=0;i<RARITIES.length;i++){ acc += RARITIES[i].prob; if (r < acc) return RARITIES[i]; }
    return RARITIES[0];
  }
  function shipPriceFor(cow) {
    if (!cow) return 0;
    return Math.round(BASE_PRICE * rarityByKey(cow.rarity).mult * state.seriFactor);
  }

  // ===== サシ度（☆1〜5・出荷時に抽選し価格へ最後に掛ける。保存はしない）=====
  var SASHI_BONUS = [0.9, 1.0, 1.1, 1.25, 1.5];   // index = ☆-1
  // レア度キー → ☆1..☆5 の確率（高レアほど良いサシが出やすい）
  var SASHI_PROB = {
    normal: [0.20, 0.40, 0.30, 0.09, 0.01],
    good:   [0.10, 0.35, 0.35, 0.17, 0.03],
    great:  [0.05, 0.25, 0.38, 0.24, 0.08],
    legend: [0.00, 0.15, 0.35, 0.32, 0.18]
  };
  function rollSashi(rarityKey) {
    var probs = SASHI_PROB[rarityKey] || SASHI_PROB.normal;
    var r = Math.random(), acc = 0;
    for (var i=0;i<probs.length;i++){ acc += probs[i]; if (r < acc) return i + 1; }
    return probs.length;   // ☆5（丸め誤差の保険）
  }
  function sashiBonus(stars){ return SASHI_BONUS[stars-1]; }
  // ボーナス倍率の表示（0.9 / 1.0 / 1.1 / 1.25 / 1.5）
  function bonusText(b){ return (Math.round(b*100) % 10 === 0) ? b.toFixed(1) : b.toFixed(2); }

  function fmt(n){ return Math.floor(n).toLocaleString("ja-JP"); }

  // ===== トースト =====
  var toastEl = document.getElementById("toast");
  var toastTimer = null;
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove("show"); }, 2200);
  }

  // ===== アクション（すべて牛房単位）=====
  function adopt(i) {
    var barn = state.barns[i];
    if (!barn || barn.cow) return;
    if (state.money < ADOPT_COST) { toast("おさいふが たりないよ 💦"); return; }
    state.money -= ADOPT_COST;
    var rar = rollRarity();
    barn.cow = { rarity: rar.key, growth: 0, feed: 0 };
    save();                    // 減算・抽選はここで確定保存（演出中にリロードしても牛は存在）
    startGacha(i, rar.key);    // 以降は見せ方のみ。render は演出側が呼ぶ
  }
  // なでる手応え：タップ位置の少し上にフローティングテキストを出す
  function floatText(ev, text, small) {
    var el = document.createElement("div");
    el.className = "floaty" + (small ? " small" : "");
    el.textContent = text;
    var x = (ev && ev.clientX != null) ? ev.clientX : window.innerWidth / 2;
    var y = (ev && ev.clientY != null) ? ev.clientY : window.innerHeight / 2;
    el.style.left = x + "px";
    el.style.top = (y - 16) + "px";   // 指の少し上
    document.body.appendChild(el);
    requestAnimationFrame(function(){ el.classList.add("go"); });
    setTimeout(function(){ if (el.parentNode) el.parentNode.removeChild(el); }, 850);
  }
  function petAt(i, ev) {
    var barn = state.barns[i];
    if (!barn || !barn.cow) return;
    var cow = barn.cow;
    if (cow.growth >= 100) { floatText(ev, "しゅっか できるよ 🎀", true); return; }
    var now = Date.now();
    if (now - (barn.lastPet || 0) < PET_COOLDOWN) {   // クールダウン中も無反応にしない
      floatText(ev, "💤", true);
      return;
    }
    barn.lastPet = now;
    cow.growth = clampGrowth(cow.growth + PET_GAIN);
    floatText(ev, "+" + PET_GAIN + "% 💕", false);
    save(); render();
  }
  function ship(i) {
    var barn = state.barns[i];
    if (!barn || !barn.cow || barn.cow.growth < 100) return;
    var rar = rarityByKey(barn.cow.rarity);
    // サシ度を抽選（開けてびっくり）。基本×レア×セリ の積に最後にボーナスを掛ける
    var stars = rollSashi(barn.cow.rarity);
    // さいこうのごはん：抽選結果への後処理で1段階優遇（☆4以下なら+1。確率テーブルは不変）
    if ((barn.cow.feed|0) === 2 && stars < 5) stars++;
    var bonus = sashiBonus(stars);
    var price = Math.round(BASE_PRICE * rar.mult * state.seriFactor * bonus);
    state.money += price;
    // ずかん記録（レア度×サシ度のマス。初達成日・回数・最高価格）
    var zIdx = rarityIndex(barn.cow.rarity) * 5 + (stars - 1);
    var zCell = state.zukan[zIdx];
    var zukanNew = !zCell;
    if (zukanNew) state.zukan[zIdx] = { first: Date.now(), count: 1, best: price, frame: 0 };
    else { zCell.count++; if (price > zCell.best) zCell.best = price; }
    barn.cow = null;
    save(); render();
    showSashi(stars, bonus, price, zukanNew);
  }
  function buyBarn(i) {
    // 次に増やせるおうちのみ購入可（順番に解放）
    if (i !== state.barns.length || i >= MAX_BARNS) return;
    var price = BARN_PRICES[i-1];
    if (state.money < price) { toast("おさいふが たりないよ 💦"); return; }
    // 詰み防止：購入後の残高が子牛の価格を下回るなら確認する
    if (state.money - price < ADOPT_COST) {
      if (!window.confirm("買うと子牛をお迎えできなくなるかも🐄💦 それでも買う?")) return;
    }
    state.money -= price;
    state.barns.push({ cow:null, lastPet:0 });
    var count = state.barns.length;
    if (checkRelief()) { render(); return; }   // 詰み状態なら即補填し応援金メッセージを優先
    save(); render();
    toast(count + "つ目のおうちを 増やした！ 🏡");
  }

  // ===== 救済（詰み防止）=====
  // 牛が0頭かつ所持金が子牛の価格未満なら「応援金」で補填する（何度でも発動）
  function noCows() {
    for (var i=0;i<state.barns.length;i++){ if (state.barns[i].cow) return false; }
    return true;
  }
  function checkRelief() {
    if (noCows() && state.money < ADOPT_COST) {
      state.money = ADOPT_COST;   // 30,000G まで補填
      save();
      toast("🎁 応援金がとどきました！");
      return true;
    }
    return false;
  }

  // ===== グリッド構築（6スロットを一度だけ生成）=====
  var slots = [];
  function buildGrid() {
    var grid = document.getElementById("grid");
    for (var i=0;i<MAX_BARNS;i++){
      var slot = document.createElement("div");
      slot.className = "slot";

      var top = document.createElement("div"); top.className = "s-top";
      var emoji = document.createElement("div"); emoji.className = "s-emoji";
      var mid = document.createElement("div"); mid.className = "s-mid";
      var bar = document.createElement("div"); bar.className = "s-bar";
      var fill = document.createElement("div"); fill.className = "s-fill";
      bar.appendChild(fill);
      var btn = document.createElement("button"); btn.className = "s-btn"; btn.type = "button";
      // ごはんボタン（カード右上・牛がいる時だけ表示。現在のごはん表示を兼ねる）
      var feed = document.createElement("button"); feed.className = "feed-btn"; feed.type = "button";
      feed.textContent = "🍚"; feed.style.display = "none";
      var btnrow = document.createElement("div"); btnrow.className = "s-btnrow";
      btnrow.appendChild(btn); btnrow.appendChild(feed);   // 出荷ボタンの右横に🍚

      slot.appendChild(top); slot.appendChild(emoji); slot.appendChild(mid);
      slot.appendChild(bar); slot.appendChild(btnrow);
      grid.appendChild(slot);

      (function(idx, btnEl, feedEl){
        // なでる（お金が動かない）は即応性重視で pointerdown。
        // 絵文字周辺のみ反応するのでスクロール起点の誤反応は実害なし（+0.5%のみ）。
        slot.addEventListener("pointerdown", function(ev){
          if (btnEl.contains(ev.target) || feedEl.contains(ev.target)) return;
          handleCardPet(idx, ev);
        });
        // お金が動く操作（迎える/増やす）は click。
        // pointerdown だとスクロール起点の接触で誤購入するため、静止タップの click に限定。
        slot.addEventListener("click", function(ev){
          if (btnEl.contains(ev.target) || feedEl.contains(ev.target)) return;   // ボタンは専用ハンドラに任せる
          handleCardBuy(idx);
        });
        // ボタンは専用動作（出荷等の確定操作なので click のまま）。
        btn.addEventListener("click", function(ev){ handleButton(idx, ev); });
        feed.addEventListener("click", function(ev){ ev.stopPropagation(); openFeedMenu(idx); });
      })(i, btn, feed);

      slots.push({ slot:slot, top:top, emoji:emoji, mid:mid, bar:bar, fill:fill, btn:btn, feed:feed });
    }
  }

  // なで判定領域：牛の絵文字を中心に、絵文字サイズの約1.5倍の円内だけ反応
  function withinPetZone(i, ev) {
    if (ev.clientX == null) return true;   // 座標が取れない場合は許可
    var r = slots[i].emoji.getBoundingClientRect();
    var cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    var radius = Math.max(r.width, r.height) * 0.75;   // 直径 ≒ 絵文字の1.5倍
    var dx = ev.clientX - cx, dy = ev.clientY - cy;
    return (dx * dx + dy * dy) <= radius * radius;
  }
  // カードの pointerdown：演出中はスキップ / 牛の絵文字周辺のみ「なでる」（お金は動かない）
  function handleCardPet(i, ev) {
    if (gachaFx[i] && gachaFx[i].phase < 3) { skipGacha(i); return; }   // タップで結果へスキップ
    var n = state.barns.length;
    if (i < n && state.barns[i].cow && withinPetZone(i, ev)) petAt(i, ev);  // テキスト・余白は無反応
  }
  // カードの click：お金が動く操作。空き→迎える / 次の未解放→増やす
  function handleCardBuy(i) {
    var n = state.barns.length;
    if (i < n) { if (!state.barns[i].cow) adopt(i); }
    else if (i === n) buyBarn(i);
  }
  // ボタン：牛(完成)→出荷 / 空き→迎える / 次の未解放→増やす（育て中ボタンのなで反応は無し）
  function handleButton(i, ev) {
    var n = state.barns.length;
    if (i < n) {
      var cow = state.barns[i].cow;
      if (cow) { if (cow.growth >= 100) ship(i); }   // 育て中は非活性・なで無効
      else adopt(i);
    } else if (i === n) buyBarn(i);
  }

  // ===== お迎えガチャ演出（見せ方のみ。お金・抽選は adopt 時点で確定済み）=====
  // gachaFx はセーブしない一時状態。表示状態オブジェクトに演出フェーズを反映し、
  // フェーズ中はビューが不変になるため、毎秒の render がアニメをリセットしない。
  var gachaFx = {};       // slotIndex -> { phase:1|2|3, rarKey, timer }
  var adoptCount = 0;     // セッション内のお迎え回数（3回目以降は短縮）

  function startGacha(i, rarKey) {
    adoptCount++;
    var fast = adoptCount >= 3;          // 3回目以降は合計約0.5秒に短縮
    var t1 = fast ? 200 : 800;           // 1) 🚚が揺れる
    var t2 = fast ? 300 : 1000;          // 2) シルエットが2回バウンド
    gachaFx[i] = { phase: 1, rarKey: rarKey, timer: null };
    gachaFx[i].timer = setTimeout(function(){
      if (!gachaFx[i]) return;
      gachaFx[i].phase = 2;
      gachaFx[i].timer = setTimeout(function(){ finishGacha(i); }, t2);
      render();
    }, t1);
    render();
  }
  function skipGacha(i) {
    var fx = gachaFx[i];
    if (fx && fx.phase < 3) { if (fx.timer) clearTimeout(fx.timer); finishGacha(i); }
  }
  function finishGacha(i) {
    var fx = gachaFx[i];
    if (!fx) return;
    if (fx.timer) clearTimeout(fx.timer);
    var rarKey = fx.rarKey;
    // 3) ぽんっ✨（0.6秒だけ pop クラスを付けて通常表示へ）
    gachaFx[i] = { phase: 3, rarKey: rarKey,
                   timer: setTimeout(function(){ delete gachaFx[i]; render(); }, 600) };
    var r = slots[i].emoji.getBoundingClientRect();
    floatText({ clientX: r.left + r.width/2, clientY: r.top + r.height/2 }, "✨", false);
    if (rarKey === "legend") celebrateLegend(i);
    render();
  }
  function celebrateLegend(i) {
    // 紙吹雪：カード内オーバーレイ。差分レンダリングが触らない要素なので render と干渉しない
    var conf = document.createElement("div");
    conf.className = "confetti";
    var colors = ["#ffd54a", "#ff9ec4", "#a0d8ff", "#b6f0c8"];
    for (var k=0;k<12;k++){
      var p = document.createElement("i");
      p.style.left = (5 + Math.random()*90) + "%";
      p.style.animationDelay = (Math.random()*0.4).toFixed(2) + "s";
      p.style.background = colors[k % colors.length];
      conf.appendChild(p);
    }
    slots[i].slot.appendChild(conf);
    setTimeout(function(){ if (conf.parentNode) conf.parentNode.removeChild(conf); }, 2200);
    // 小ポップ
    var pop = document.createElement("div");
    pop.className = "legend-pop";
    pop.textContent = "👑 でんせつの子がやってきた！";
    document.body.appendChild(pop);
    requestAnimationFrame(function(){ pop.classList.add("show"); });
    setTimeout(function(){
      pop.classList.remove("show");
      setTimeout(function(){ if (pop.parentNode) pop.parentNode.removeChild(pop); }, 300);
    }, 1800);
  }

  // ===== 表示状態の算出（純粋関数）: state → 1スロット分の表示プロパティ =====
  // ここでは DOM に触らない。差分反映は applySlotView が担当。
  // 牛あり
  function viewCow(barn) {
    var rar = rarityByKey(barn.cow.rarity);
    var g = Math.min(100, barn.cow.growth);
    var st = growthStage(g);
    var ready = g >= 100;
    var feed = barn.cow.feed|0;
    return {
      slotCls: "slot", cursor: "pointer",
      topCls: "s-top", topText: st.name,
      // ごはんボタン＝現在のごはん表示を兼ねる（f0ふつう/f1いい/f2さいこう）
      feedShow: true, feedCls: "feed-btn f" + feed, feedText: FEED_DEFS[feed].icon,
      // 絵文字は一回り大きく（頭上の演出が指で隠れないサイズ感）
      emojiCls: "s-emoji tap",
      emojiSize: st.small ? "62px" : "76px",
      emojiText: st.small ? rar.face : rar.faceBig,
      midCls: "s-mid " + rar.cls,
      midText: (rar.star ? rar.star + " " : "") + rar.name + "（×" + rar.mult.toFixed(1) + "）",
      barCls: "s-bar", fillWidth: g + "%",
      // 出荷は完成時のみ。育て中ボタンは非活性（なで無効）
      btnCls: "s-btn ship", btnDisabled: !ready,
      btnText: ready ? ("出荷 " + fmt(shipPriceFor(barn.cow)) + "G")
                     : ("育て中 " + Math.floor(g) + "%")
    };
  }
  // 空きおうち → 「＋」で迎える
  function viewEmpty() {
    return {
      slotCls: "slot pressable", cursor: "pointer",   // カード全体が押せる（押下でぷにっと）
      topCls: "s-top muted", topText: "あきべや",
      emojiCls: "s-emoji plus", emojiSize: "56px", emojiText: "＋",
      midCls: "s-mid plain", midText: "子牛を迎えよう",
      barCls: "s-bar hidden", fillWidth: "0%",
      btnCls: "s-btn adopt", btnDisabled: false,   // 不足時は adopt() がトーストで案内
      btnText: "迎える " + fmt(ADOPT_COST) + "G"
    };
  }
  // 次に増やせるおうち（🔒＋価格・購入可）
  function viewUnlockable(i) {
    return {
      slotCls: "slot locked pressable", cursor: "pointer",   // カード全体が押せる（押下でぷにっと）
      topCls: "s-top muted", topText: "おうちを増やす",
      emojiCls: "s-emoji plus", emojiSize: "44px", emojiText: "🔒",
      midCls: "s-mid plain", midText: "ここを増やせる",
      barCls: "s-bar hidden", fillWidth: "0%",
      btnCls: "s-btn buy", btnDisabled: false,   // 不足時は buyBarn() がトーストで案内
      btnText: "増やす " + fmt(BARN_PRICES[i-1]) + "G"
    };
  }
  // まだ増やせないおうち（🔒＋価格・非活性）
  function viewLocked(i) {
    return {
      slotCls: "slot locked", cursor: "default",
      topCls: "s-top muted", topText: "みかいほう",
      emojiCls: "s-emoji lock", emojiSize: "44px", emojiText: "🔒",
      midCls: "s-mid plain", midText: "じゅんばんに増える",
      barCls: "s-bar hidden", fillWidth: "0%",
      btnCls: "s-btn", btnDisabled: true,
      btnText: "🔒 " + fmt(BARN_PRICES[i-1]) + "G"
    };
  }
  // ガチャ演出中のビュー。フェーズ中は値が不変なので、毎秒の render では差分ゼロ＝
  // DOM書き換えが起きず、CSSアニメーション（揺れ・バウンド）がリセットされない。
  function viewGacha(fx, barn) {
    if (fx.phase === 3) {
      var v = viewCow(barn);
      v.emojiCls += " gacha-pop";   // ぽんっ（一度きりのCSSアニメ。0.6秒後にfx解除で外れる）
      return v;
    }
    // すごい/でんせつはシルエット中だけ金色の告知
    var gold = fx.phase === 2 && (fx.rarKey === "great" || fx.rarKey === "legend");
    return {
      slotCls: gold ? "slot gacha-gold" : "slot", cursor: "pointer",
      topCls: "s-top", topText: "おむかえ中…",
      emojiCls: fx.phase === 1 ? "s-emoji gacha-truck" : "s-emoji gacha-silhouette",
      emojiSize: "56px",
      emojiText: fx.phase === 1 ? "🚚" : "🐄",
      midCls: "s-mid plain", midText: "だれかな…？",
      barCls: "s-bar hidden", fillWidth: "0%",
      btnCls: "s-btn", btnDisabled: true, btnText: "わくわく…"
    };
  }
  function computeSlotView(i) {
    var n = state.barns.length;
    if (i < n) {
      var barn = state.barns[i];
      if (barn.cow && gachaFx[i]) return viewGacha(gachaFx[i], barn);
      return barn.cow ? viewCow(barn) : viewEmpty();
    }
    if (i === n && i < MAX_BARNS) return viewUnlockable(i);
    return viewLocked(i);
  }

  // ===== 差分反映：前回の表示状態と比べ、変化したプロパティだけ DOM へ =====
  // 毎秒変わるのは実質 fillWidth（成長バー）と btnText（育て中%）のみ。
  // className・絵文字は状態遷移時にしか書き換えないので、CSSアニメーションを妨げない。
  var prevViews = [];
  function applySlotView(i, v) {
    var s = slots[i], p = prevViews[i] || {};
    if (v.slotCls     !== p.slotCls)     s.slot.className = v.slotCls;
    if (v.cursor      !== p.cursor)      s.slot.style.cursor = v.cursor;
    if (v.topCls      !== p.topCls)      s.top.className = v.topCls;
    if (v.topText     !== p.topText)     s.top.textContent = v.topText;
    if (v.emojiCls    !== p.emojiCls)    s.emoji.className = v.emojiCls;
    if (v.emojiSize   !== p.emojiSize)   s.emoji.style.fontSize = v.emojiSize;
    if (v.emojiText   !== p.emojiText)   s.emoji.textContent = v.emojiText;
    if (v.midCls      !== p.midCls)      s.mid.className = v.midCls;
    if (v.midText     !== p.midText)     s.mid.textContent = v.midText;
    if (v.barCls      !== p.barCls)      s.bar.className = v.barCls;
    if (v.fillWidth   !== p.fillWidth)   s.fill.style.width = v.fillWidth;
    if (v.btnCls      !== p.btnCls)      s.btn.className = v.btnCls;
    if (v.btnDisabled !== p.btnDisabled) s.btn.disabled = v.btnDisabled;
    if (v.btnText     !== p.btnText)     s.btn.textContent = v.btnText;
    // ごはんボタン（feedShow 未定義のビュー＝非表示。非表示中はクラス/文字を書かない）
    if (!!v.feedShow !== !!p.feedShow)   s.feed.style.display = v.feedShow ? "" : "none";
    if (v.feedShow && v.feedCls  !== p.feedCls)  s.feed.className = v.feedCls;
    if (v.feedShow && v.feedText !== p.feedText) s.feed.textContent = v.feedText;
    prevViews[i] = v;
  }

  var moneyEl = document.getElementById("money");
  var seriEl = document.getElementById("seri");
  var prevMoneyText = null, prevSeriText = null;
  function render() {
    var moneyText = fmt(state.money) + " G";
    if (moneyText !== prevMoneyText) { moneyEl.textContent = moneyText; prevMoneyText = moneyText; }
    var seriText = "今日のセリ：" + seriLabel(state.seriFactor) + "（×" + state.seriFactor.toFixed(2) + "）";
    if (seriText !== prevSeriText) { seriEl.textContent = seriText; prevSeriText = seriText; }
    for (var i=0;i<MAX_BARNS;i++) applySlotView(i, computeSlotView(i));
  }

  // ===== 成長：時刻差分ベースで全おうちの牛に適用 =====
  function applyGrowth(now) {
    now = now || Date.now();
    var base = (typeof state.lastUpdate === "number") ? state.lastUpdate : now;
    var delta = now - base;
    if (delta < 0) delta = 0;                 // 時計巻き戻しは0扱い
    var seconds = delta / 1000;
    if (seconds > 0) {
      for (var i=0;i<state.barns.length;i++){
        var cow = state.barns[i].cow;
        if (!cow || cow.growth >= 100) continue;
        var mult = rarityByKey(cow.rarity).mult * FEED_DEFS[cow.feed|0].mult;   // ごはん倍率は購入時点から残りの成長分に適用
        cow.growth = clampGrowth(cow.growth + (100 / GROW_SECONDS) * mult * seconds);
      }
    }
    state.lastUpdate = now;
  }

  // ===== ゲームループ（1秒tick）＝ 差分適用＋描画 =====
  function tick() {
    refreshSeri();
    applyGrowth(Date.now());
    checkRelief();   // 詰み状態を検知したら応援金で補填
    render();
    save();
  }
  var tickTimer = null;
  function startLoop(){ if (!tickTimer) tickTimer = setInterval(tick, 1000); }
  function stopLoop(){ if (tickTimer) { clearInterval(tickTimer); tickTimer = null; } }

  // ===== サシ度の結果ポップ（出荷時。render は触らないのでアニメは維持される）=====
  var sashiEl = document.getElementById("sashi");
  var sTitle = document.getElementById("sTitle");
  var sEmoji = document.getElementById("sEmoji");
  var sSashi = document.getElementById("sSashi");
  var sMoney = document.getElementById("sMoney");
  var sZukan = document.getElementById("sZukan");
  document.getElementById("sClose").addEventListener("click", function(){ sashiEl.hidden = true; });
  function showSashi(stars, bonus, price, zukanNew) {
    var isMax = stars >= 5;
    sEmoji.textContent = isMax ? "✨🥩✨" : "🥩";
    sTitle.textContent = isMax ? "さいこうのサシ！" : "しゅっか！🎉";
    // サシ度 → 金額 の順で表示
    sSashi.textContent = "🥩 サシ度 " + repeat("☆", stars) + "！ボーナス×" + bonusText(bonus);
    sMoney.textContent = "💰 +" + fmt(price) + " G";
    sZukan.hidden = !zukanNew;   // 新マス達成の時だけ「📖 ずかんに登録！」
    sashiEl.classList.toggle("sashi-max", isMax);   // ☆5だけ豪華に
    sashiEl.hidden = false;
  }
  function repeat(ch, n){ var s = ""; for (var i=0;i<n;i++) s += ch; return s; }

  // ===== 牛ずかん＋額縁（モーダルは開いた時のみ構築。毎秒の render とは無関係）=====
  var FRAME_DEFS = [
    { name: "額縁なし", price: 0 },
    { name: "木の額縁 🪵", price: 10000 },
    { name: "銀の額縁 🥈", price: 100000 },
    { name: "金の額縁 🥇", price: 1000000 }
  ];
  function fmtMan(n){ return (Math.round(n / 1000) / 10) + "万"; }   // 36000 → 3.6万
  var zukanEl = document.getElementById("zukan");
  var zGrid = document.getElementById("zGrid");
  var frameMenuEl = document.getElementById("frameMenu");
  var fTitle = document.getElementById("fTitle");
  var fInfo = document.getElementById("fInfo");
  var fBtns = document.getElementById("fBtns");
  document.getElementById("zukanBtn").addEventListener("click", function(){ buildZukan(); zukanEl.hidden = false; });
  document.getElementById("zClose").addEventListener("click", function(){ zukanEl.hidden = true; });
  document.getElementById("fClose").addEventListener("click", function(){ frameMenuEl.hidden = true; });

  function buildZukan() {
    zGrid.innerHTML = "";
    // ヘッダー行：☆1〜☆5
    var head = document.createElement("div"); head.className = "z-row";
    var corner = document.createElement("div"); corner.className = "z-col"; head.appendChild(corner);
    for (var st=1; st<=5; st++){
      var h = document.createElement("div"); h.className = "z-col"; h.textContent = "☆" + st;
      head.appendChild(h);
    }
    zGrid.appendChild(head);
    // レア度ごとに1行（ラベル＋5マス）
    for (var r=0; r<RARITIES.length; r++){
      var row = document.createElement("div"); row.className = "z-row";
      var lab = document.createElement("div"); lab.className = "z-label " + RARITIES[r].cls;
      lab.textContent = (RARITIES[r].star ? RARITIES[r].star : "") + RARITIES[r].name;
      row.appendChild(lab);
      for (var s2=1; s2<=5; s2++){
        row.appendChild(buildZukanCell(r*5 + s2 - 1));
      }
      zGrid.appendChild(row);
    }
  }
  function buildZukanCell(idx) {
    // 抽選確率0%のマス（でんせつ☆1）は永久に埋まらないため空欄にする。
    // セーブのzukan配列は20要素のまま（該当indexは未使用として残す）
    var rar = RARITIES[Math.floor(idx / 5)], st = (idx % 5) + 1;
    if ((SASHI_PROB[rar.key] || SASHI_PROB.normal)[st - 1] === 0) {
      var sp = document.createElement("div");
      sp.className = "z-cell none";
      sp.textContent = "👑";   // 軽い飾りのみ
      return sp;
    }
    var cell = state.zukan[idx];
    var d = document.createElement("div");
    if (cell) {
      d.className = "z-cell done" + (cell.frame ? " f" + cell.frame : "");
      var e1 = document.createElement("div"); e1.className = "z-emoji"; e1.textContent = "🐄";
      var e2 = document.createElement("div"); e2.className = "z-sub"; e2.textContent = "×" + cell.count;
      var e3 = document.createElement("div"); e3.className = "z-sub"; e3.textContent = fmtMan(cell.best) + "G";
      d.appendChild(e1); d.appendChild(e2); d.appendChild(e3);
      d.addEventListener("click", function(){ openFrameMenu(idx); });   // 達成済みマス→額縁メニュー
    } else {
      d.className = "z-cell";
      d.textContent = "?";
    }
    return d;
  }

  function openFrameMenu(idx) {
    var cell = state.zukan[idx];
    if (!cell) return;
    var rar = RARITIES[Math.floor(idx / 5)], st = (idx % 5) + 1;
    fTitle.textContent = (rar.star ? rar.star + " " : "") + rar.name + " " + repeat("☆", st);
    var d = cell.first ? new Date(cell.first) : null;
    fInfo.textContent = (d ? "初達成 " + (d.getMonth()+1) + "/" + d.getDate() + "　" : "")
      + "×" + cell.count + "回　最高 " + fmt(cell.best) + " G";
    fBtns.innerHTML = "";
    for (var lv=1; lv<=3; lv++){
      (function(level){
        var b = document.createElement("button");
        b.type = "button";
        b.className = "s-btn buy";
        var owned = cell.frame >= level;   // 上位への置き換えのみ可（返金なし）
        b.disabled = owned;
        b.textContent = FRAME_DEFS[level].name + " " + fmtMan(FRAME_DEFS[level].price) + "G"
          + (cell.frame === level ? "（かざり中）" : owned ? "（購入済み）" : "");
        b.addEventListener("click", function(){ buyFrame(idx, level); });
        fBtns.appendChild(b);
      })(lv);
    }
    frameMenuEl.hidden = false;
  }
  function buyFrame(idx, level) {
    var cell = state.zukan[idx];
    if (!cell || cell.frame >= level) return;
    var price = FRAME_DEFS[level].price;
    if (state.money < price) { toast("おさいふが たりないよ 💦"); return; }
    state.money -= price;
    cell.frame = level;
    save(); render();
    frameMenuEl.hidden = true;
    buildZukan();   // 開いているずかんの額縁表示を更新
    toast(FRAME_DEFS[level].name + "を かざった！");
  }

  // ===== ごはんグレード（メニューは開いた時のみ構築。毎秒の render と無関係）=====
  var feedMenuEl = document.getElementById("feedMenu");
  var feedInfo = document.getElementById("feedInfo");
  var feedBtnsEl = document.getElementById("feedBtns");
  document.getElementById("feedClose").addEventListener("click", function(){ feedMenuEl.hidden = true; });
  function openFeedMenu(i) {
    var barn = state.barns[i];
    if (!barn || !barn.cow) return;
    var cur = barn.cow.feed|0;
    feedInfo.textContent = "いまのごはん：" + FEED_DEFS[cur].name + " " + FEED_DEFS[cur].icon;
    feedBtnsEl.innerHTML = "";
    for (var g=0; g<FEED_DEFS.length; g++){
      (function(grade){
        var def = FEED_DEFS[grade];
        var b = document.createElement("button");
        b.type = "button";
        b.className = "s-btn buy";
        b.disabled = grade <= cur;   // 上位への変更のみ可（下位・同一は不可）
        b.textContent = def.icon + " " + def.name
          + (def.price ? " " + fmtMan(def.price) + "G" : "（無料）")
          + (grade === cur ? "（たべてる）" : grade < cur ? "" : "");
        var effects = grade === 2 ? "成長+60%・サシ優遇" : grade === 1 ? "成長+30%" : "";
        if (effects) b.textContent += "｜" + effects;
        b.addEventListener("click", function(){ buyFeed(i, grade); });
        feedBtnsEl.appendChild(b);
      })(g);
    }
    feedMenuEl.hidden = false;
  }
  function buyFeed(i, grade) {
    var barn = state.barns[i];
    if (!barn || !barn.cow) return;
    if (grade <= (barn.cow.feed|0)) return;   // 下位への変更は不可
    var price = FEED_DEFS[grade].price;       // 差額ではなく全額
    if (state.money < price) { toast("おさいふが たりないよ 💦"); return; }
    state.money -= price;
    barn.cow.feed = grade;
    save(); render();
    feedMenuEl.hidden = true;
    toast(FEED_DEFS[grade].name + "に かえた！🍚");
  }

  // ===== おかえり表示（読込・タブ復帰時）=====
  var welcomeEl = document.getElementById("welcome");
  var wAway = document.getElementById("wAway");
  var wLines = document.getElementById("wLines");
  document.getElementById("wClose").addEventListener("click", function(){ welcomeEl.hidden = true; });

  function awayLabel(ms) {
    var min = Math.floor(ms / 60000);
    if (min < 60) return min + "分ぶり";
    var hr = Math.floor(min / 60);
    if (hr < 24) return hr + "時間ぶり";
    return Math.floor(hr / 24) + "日ぶり";
  }
  function showWelcome(awayMs, newlyShippable, grownCount, totalGain) {
    wAway.textContent = awayLabel(awayMs);
    var lines = [];
    if (newlyShippable > 0) lines.push("🎀 出荷できるようになった子：" + newlyShippable + "頭");
    if (grownCount > 0) lines.push("🌱 育った子：" + grownCount + "頭（あわせて +" + Math.round(totalGain) + "%）");
    if (lines.length === 0) lines.push("🐄 みんな元気にまってたよ");   // 変化なしの長期離席あいさつ
    wLines.innerHTML = "";
    for (var i=0;i<lines.length;i++){
      var d = document.createElement("div");
      d.className = "modal-line";
      d.textContent = lines[i];
      wLines.appendChild(d);
    }
    welcomeEl.hidden = false;
  }
  // 差分を適用しつつ、離席60秒以上かつ変化があれば「おかえり」を表示
  function processReturn() {
    refreshSeri();
    var now = Date.now();
    var awayMs = now - ((typeof state.lastUpdate === "number") ? state.lastUpdate : now);
    if (awayMs < 0) awayMs = 0;
    // 適用前をスナップショット（変化計測用）
    var snap = [];
    for (var i=0;i<state.barns.length;i++){
      var c = state.barns[i].cow;
      snap.push(c ? { g: c.growth, shippable: c.growth >= 100 } : null);
    }
    applyGrowth(now);
    var newlyShippable = 0, grownCount = 0, totalGain = 0;
    for (var j=0;j<state.barns.length;j++){
      var cow = state.barns[j].cow, sp = snap[j];
      if (!cow || !sp) continue;
      var gain = cow.growth - sp.g;
      if (gain >= 1) { grownCount++; totalGain += gain; }
      if (!sp.shippable && cow.growth >= 100) newlyShippable++;
    }
    // 変化ありなら60秒以上で表示。変化なしでも12時間以上の長期離席なら挨拶する
    var LONG_AWAY_MS = 12 * 60 * 60 * 1000;
    var changed = grownCount > 0 || newlyShippable > 0;
    if (awayMs >= 60000 && (changed || awayMs >= LONG_AWAY_MS)) {
      showWelcome(awayMs, newlyShippable, grownCount, totalGain);
    }
    checkRelief();
    render();
    save();
  }

  // ===== iOS Safari 向け：ダブルタップ／ピンチズームの確実な抑止 =====
  // touch-action CSS が実機で効かないケースの保険。ゲームは単一ページのため
  // ページ内ズームを無効化する（OSの画面ズームで代替可能）。
  function installZoomGuards() {
    var lastTouchEnd = 0;
    document.addEventListener("touchend", function(e){
      // 活性ボタン上のタップのみ除外（確定操作の click を殺さない）。
      // disabled な「育て中」ボタンは抜け道になるので抑止対象に含める。
      var btn = e.target && e.target.closest ? e.target.closest(".s-btn, .feed-btn") : null;
      if (btn && !btn.disabled) { lastTouchEnd = Date.now(); return; }
      var now = Date.now();
      if (now - lastTouchEnd < 350) e.preventDefault();   // 直前タップから350ms未満=ダブルタップ
      lastTouchEnd = now;
    }, { passive: false });
    // iOS独自のピンチズームイベントを無効化
    document.addEventListener("gesturestart",  function(e){ e.preventDefault(); });
    document.addEventListener("gesturechange", function(e){ e.preventDefault(); });
    document.addEventListener("gestureend",    function(e){ e.preventDefault(); });
  }

  // ===== 初期化 =====
  load();
  buildGrid();
  installZoomGuards();
  processReturn();          // 読込時：オフライン分を反映し、必要ならおかえり表示
  startLoop();              // モーダル表示中もループは止めない

  // タブ非表示→復帰でも「おかえり」を発火（復帰時に差分をまとめて反映）
  document.addEventListener("visibilitychange", function(){
    if (document.visibilityState === "visible") { processReturn(); startLoop(); }
    else { applyGrowth(Date.now()); save(); stopLoop(); }   // 破棄前に成長を確定保存
  });
})();
</script>
</body>
</html>
