<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ffe4ef">
<title>うしぽこ 🐄</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;   /* タップ時の灰色ハイライト除去 */
    -webkit-touch-callout: none;                /* 絵文字などの長押しメニュー防止 */
  }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, "Hiragino Maru Gothic ProN", "Hiragino Sans", sans-serif;
    background: linear-gradient(160deg, #fff0f6 0%, #eaf7ff 55%, #eafff0 100%);
    color: #5a4a52;
    min-height: 100%;
    -webkit-user-select: none; user-select: none;   /* 連打時のテキスト選択防止 */
    overscroll-behavior: none;
    touch-action: manipulation;   /* 背景・隙間へのダブルタップズームも無効化 */
  }
  #app {
    max-width: 440px;
    margin: 0 auto;
    padding: 16px 16px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    min-height: 100vh;
  }
  .title {
    font-size: 22px; font-weight: 800; letter-spacing: .04em;
    color: #ff8fb1; margin: 6px 0 0;
  }

  /* カード共通 */
  .card {
    width: 100%;
    background: rgba(255,255,255,0.72);
    border-radius: 26px;
    padding: 16px 18px;
    box-shadow: 0 6px 18px rgba(255,170,200,0.25);
  }

  /* 上部ステータス */
  .status { display: flex; flex-direction: column; gap: 10px; }
  .money-row { display: flex; align-items: baseline; justify-content: space-between; }
  .money-label { font-size: 13px; color: #b89aa6; font-weight: 700; }
  .money-val { font-size: 26px; font-weight: 800; color: #ff9a3d; }
  .seri {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    background: #fff6fa; border-radius: 18px; padding: 8px 12px;
    font-size: 15px; font-weight: 700; color: #7a6a72;
  }

  /* 牛房グリッド（スマホ幅で2列×3段）*/
  .grid {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    touch-action: pan-y;   /* 縦スクロールのみ許可・ピンチ/ダブルタップ無効。複数指のpointerdownを各カードへ個別配送 */
  }
  .slot {
    background: rgba(255,255,255,0.72);
    border-radius: 22px;
    padding: 12px 10px;
    min-height: 198px;
    display: flex; flex-direction: column; align-items: center; gap: 7px;
    box-shadow: 0 5px 14px rgba(255,170,200,0.22);
    touch-action: manipulation;   /* ダブルタップズーム無効化 */
  }
  .slot.locked { background: rgba(246,241,245,0.6); box-shadow: none; }

  /* レア度色（共通）*/
  .r-normal { background:#eef3f7; color:#8aa0b2; }
  .r-good   { background:#e4f7ea; color:#4bb373; }
  .r-great  { background:#e6efff; color:#5b8bef; }
  .r-legend { background:linear-gradient(90deg,#fff0c2,#ffd6ec); color:#d98a2b; box-shadow:0 0 0 2px #ffe27a inset; }

  .s-top {
    font-size: 11px; font-weight: 800; color: #9a86c9;
    background: #f1ecff; border-radius: 999px; padding: 4px 12px;
    white-space: nowrap;
  }
  .s-top.muted { color: #b6a8c2; background: #efeaf3; }

  .s-emoji { font-size: 56px; line-height: 1.05; margin-top: 2px; touch-action: manipulation; }
  .s-emoji.tap {
    cursor: pointer;
    transition: transform .08s ease;
    filter: drop-shadow(0 6px 8px rgba(180,150,200,0.3));
  }
  .s-emoji.tap:active { transform: scale(0.86) rotate(-5deg); }
  .s-emoji.plus { color: #ff9ec4; font-weight: 800; cursor: pointer; }
  .s-emoji.lock { opacity: .5; filter: grayscale(.3); }

  .s-mid {
    font-size: 11px; font-weight: 800; padding: 2px 10px; border-radius: 999px;
    min-height: 18px; display: flex; align-items: center; white-space: nowrap;
  }
  .s-mid.plain { background: transparent; color: #c3b3bc; font-weight: 700; }

  .s-bar { width: 100%; height: 10px; background: #f0e6ec; border-radius: 999px; overflow: hidden; }
  .s-bar.hidden { visibility: hidden; }
  .s-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg,#ffd36e,#ff9ec4,#a0d8ff);
    border-radius: 999px; transition: width .3s ease;
  }

  .s-btn {
    width: 100%; min-height: 44px;
    border: none; border-radius: 14px;
    font-family: inherit; font-size: 13px; font-weight: 800;
    color: #fff; cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.07);
    transition: transform .06s ease; touch-action: manipulation;
    padding: 0 6px;
  }
  .s-btn:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.07); }
  .s-btn.adopt { background: linear-gradient(135deg,#ffb0cf,#ff8fb1); }
  .s-btn.ship  { background: linear-gradient(135deg,#9ad0ff,#6fb5f6); }
  .s-btn.buy   { background: linear-gradient(135deg,#ffd98a,#ffb86b); }
  .s-btn:disabled { background: #e2dbe0; color:#b6acb2; box-shadow: 0 4px 0 rgba(0,0,0,0.04); cursor: default; }

  /* なでた手応え（フローティングテキスト）*/
  .floaty {
    position: fixed;
    transform: translate(-50%, -50%);
    font-size: 22px; font-weight: 800; color: #ff6fa2;
    text-shadow: 0 1px 3px rgba(255,255,255,0.9);
    pointer-events: none; z-index: 60; white-space: nowrap;
    opacity: 1;
    transition: transform .8s ease-out, opacity .8s ease-out;
    will-change: transform, opacity;
  }
  .floaty.small { font-size: 17px; color: #a9a2b8; }
  .floaty.go { transform: translate(-50%, -50%) translateY(-52px); opacity: 0; }

  /* トースト */
  #toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
    background: rgba(90,74,82,0.92); color: #fff; font-weight: 700; font-size: 15px;
    padding: 12px 20px; border-radius: 999px; opacity: 0; pointer-events: none;
    transition: opacity .25s ease, transform .25s ease; max-width: 90%; text-align:center;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* おかえりモーダル */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background: rgba(120,100,110,0.35);
    -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
  }
  .modal-overlay[hidden] { display: none; }
  .modal-card {
    width: 100%; max-width: 320px;
    background: rgba(255,255,255,0.97);
    border-radius: 28px;
    padding: 24px 22px 20px;
    box-shadow: 0 12px 34px rgba(200,150,180,0.4);
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    animation: pop .25s ease-out;
  }
  @keyframes pop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-emoji { font-size: 64px; line-height: 1.05; }
  .modal-title { font-size: 22px; font-weight: 800; color: #ff8fb1; }
  .modal-away { font-size: 14px; font-weight: 700; color: #b89aa6; }
  .modal-lines { display: flex; flex-direction: column; gap: 6px; width: 100%; margin: 6px 0 8px; }
  .modal-line {
    font-size: 15px; font-weight: 800; color: #6a5a62;
    background: #fff6fa; border-radius: 14px; padding: 10px 12px;
  }
  #wClose { max-width: 200px; }

  .hint { font-size: 12px; color: #c3b3bc; text-align: center; }
</style>
</head>
<body>
<div id="app">
  <div class="title">うしぽこ 🐄</div>

  <div class="card status">
    <div class="money-row">
      <span class="money-label">おさいふ</span>
      <span class="money-val" id="money">0 G</span>
    </div>
    <div class="seri" id="seri">今日のセリ：—</div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="hint" id="hint">牛をなでると育つよ 🖐️　おうちをふやして たくさん育てよう！</div>
</div>
<div id="toast"></div>

<div id="welcome" class="modal-overlay" hidden>
  <div class="modal-card">
    <div class="modal-emoji">🐄</div>
    <div class="modal-title">おかえり！</div>
    <div class="modal-away" id="wAway"></div>
    <div class="modal-lines" id="wLines"></div>
    <button class="s-btn adopt" id="wClose" type="button">ただいま！</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ===== 定数 =====
  var SAVE_KEY = "ushiPokoSave_v2";     // 新形式（複数牛房）
  var OLD_KEY  = "ushiIdleSave_v1";     // 旧形式（1頭）
  var START_MONEY = 100000;
  var ADOPT_COST = 30000;               // 子牛の導入価格（据え置き）
  var BASE_PRICE = 50000;               // 出荷基本価格（据え置き）
  var GROW_SECONDS = 600;               // 基本 約10分で100%
  var PET_GAIN = 0.5;                    // なでる：+0.5%
  var PET_COOLDOWN = 500;               // 0.5秒クールダウン
  var MAX_BARNS = 6;                     // 牛房は最大6つ
  // 2つ目以降の牛房の解放価格（index i の牛房 = BARN_PRICES[i-1]）
  var BARN_PRICES = [80000, 200000, 500000, 1200000, 3000000];

  // レア度定義（順に判定）
  var RARITIES = [
    { key:"normal", name:"ふつう",   prob:0.60, mult:1.0, cls:"r-normal", face:"🐮", faceBig:"🐄", star:"" },
    { key:"good",   name:"よい",     prob:0.30, mult:1.2, cls:"r-good",   face:"🐮", faceBig:"🐄", star:"✨" },
    { key:"great",  name:"すごい",   prob:0.09, mult:1.5, cls:"r-great",  face:"🐮", faceBig:"🐄", star:"🌟" },
    { key:"legend", name:"でんせつ", prob:0.01, mult:2.0, cls:"r-legend", face:"🐮", faceBig:"🐄", star:"👑" }
  ];
  function rarityByKey(k){ for (var i=0;i<RARITIES.length;i++){ if(RARITIES[i].key===k) return RARITIES[i]; } return RARITIES[0]; }

  // ===== 状態 =====
  // barn = { cow: null | {rarity, growth, lastTick}, lastPet: number }
  var state = {
    money: START_MONEY,
    barns: [ { cow:null, lastPet:0 } ],   // 初期は1つ
    seriDate: null,
    seriFactor: 1.0,
    lastUpdate: 0                          // 成長を時刻差分で計算する基準（エポックms）
  };

  // ===== 保存 / 読み込み・マイグレーション =====
  function save() {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch (e) {}
  }
  function clampGrowth(g){ return Math.max(0, Math.min(100, g)); }
  function normCow(c){
    if (c && typeof c === "object" && typeof c.growth === "number" && c.rarity) {
      return { rarity:c.rarity, growth:clampGrowth(c.growth), lastTick:c.lastTick || Date.now() };
    }
    return null;
  }
  function normBarn(b){
    if (!b || typeof b !== "object") return { cow:null, lastPet:0 };
    return { cow: normCow(b.cow), lastPet: b.lastPet || 0 };
  }
  function load() {
    try {
      // 新形式
      var raw = localStorage.getItem(SAVE_KEY);
      if (raw) {
        var s = JSON.parse(raw);
        if (s && typeof s.money === "number" && Array.isArray(s.barns) && s.barns.length >= 1) {
          state.money = s.money;
          state.barns = s.barns.slice(0, MAX_BARNS).map(normBarn);
          state.seriDate = s.seriDate || null;
          state.seriFactor = s.seriFactor || 1.0;
          // lastUpdate が無い旧セーブは now で初期化（過去分の遡及付与はしない）
          state.lastUpdate = (typeof s.lastUpdate === "number") ? s.lastUpdate : Date.now();
          return;
        }
      }
      // 旧形式(v1) → 新形式へマイグレーション（旧1頭を牛房1へ）
      var old = localStorage.getItem(OLD_KEY);
      if (old) {
        var o = JSON.parse(old);
        if (o && typeof o === "object") {
          state.money = (typeof o.money === "number") ? o.money : START_MONEY;
          state.barns = [ { cow: normCow(o.cow), lastPet: o.lastPet || 0 } ];
          state.seriDate = o.seriDate || null;
          state.seriFactor = o.seriFactor || 1.0;
          state.lastUpdate = Date.now();   // 遡及なしで移行
          save();  // 新キーへ保存（以降は新形式で読み込み）
          return;
        }
      }
    } catch (e) {}
    // どちらも読めない場合のみ初期化
    state.money = START_MONEY;
    state.barns = [ { cow:null, lastPet:0 } ];
    state.seriDate = null;
    state.seriFactor = 1.0;
    state.lastUpdate = Date.now();
  }

  // ===== セリ係数（日替わり 0.8〜1.2・全牛房共通）=====
  function todayKey() {
    var d = new Date();
    return d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
  }
  function seedRand(str) {
    var h = 2166136261;
    for (var i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
    h = (h >>> 0);
    return (h % 100000) / 100000;
  }
  function refreshSeri() {
    var key = todayKey();
    if (state.seriDate !== key) {
      var r = seedRand("seri-" + key);
      state.seriFactor = Math.round((0.8 + r * 0.4) * 100) / 100;  // 0.80〜1.20
      state.seriDate = key;
    }
  }
  function seriLabel(f) {
    if (f >= 1.15) return "とても高め 📈📈";
    if (f >= 1.05) return "ちょっと高め 📈";
    if (f >  0.95) return "ふつう 🐄";
    if (f >  0.85) return "ちょっと安め 📉";
    return "とても安め 📉📉";
  }

  // ===== 成長段階 =====
  function growthStage(g) {
    if (g < 33)  return { name:"ミルク期 🍼",       small:true };
    if (g < 66)  return { name:"もぐもぐ期 🌱",     small:false };
    if (g < 100) return { name:"むしゃむしゃ期 🌾", small:false };
    return { name:"しゅっか OK！ 🎀", small:false };
  }

  // ===== 抽選・価格 =====
  function rollRarity() {
    var r = Math.random(), acc = 0;
    for (var i=0;i<RARITIES.length;i++){ acc += RARITIES[i].prob; if (r < acc) return RARITIES[i]; }
    return RARITIES[0];
  }
  function shipPriceFor(cow) {
    if (!cow) return 0;
    return Math.round(BASE_PRICE * rarityByKey(cow.rarity).mult * state.seriFactor);
  }

  function fmt(n){ return Math.floor(n).toLocaleString("ja-JP"); }

  // ===== トースト =====
  var toastEl = document.getElementById("toast");
  var toastTimer = null;
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove("show"); }, 2200);
  }

  // ===== アクション（すべて牛房単位）=====
  function adopt(i) {
    var barn = state.barns[i];
    if (!barn || barn.cow) return;
    if (state.money < ADOPT_COST) { toast("おさいふが たりないよ 💦"); return; }
    state.money -= ADOPT_COST;
    var rar = rollRarity();
    barn.cow = { rarity: rar.key, growth: 0, lastTick: Date.now() };
    save(); render();
    toast(rar.star + " " + rar.name + "の子牛を むかえた！");
  }
  // なでる手応え：タップ位置の少し上にフローティングテキストを出す
  function floatText(ev, text, small) {
    var el = document.createElement("div");
    el.className = "floaty" + (small ? " small" : "");
    el.textContent = text;
    var x = (ev && ev.clientX != null) ? ev.clientX : window.innerWidth / 2;
    var y = (ev && ev.clientY != null) ? ev.clientY : window.innerHeight / 2;
    el.style.left = x + "px";
    el.style.top = (y - 16) + "px";   // 指の少し上
    document.body.appendChild(el);
    requestAnimationFrame(function(){ el.classList.add("go"); });
    setTimeout(function(){ if (el.parentNode) el.parentNode.removeChild(el); }, 850);
  }
  function petAt(i, ev) {
    var barn = state.barns[i];
    if (!barn || !barn.cow) return;
    var cow = barn.cow;
    if (cow.growth >= 100) { floatText(ev, "しゅっか できるよ 🎀", true); return; }
    var now = Date.now();
    if (now - (barn.lastPet || 0) < PET_COOLDOWN) {   // クールダウン中も無反応にしない
      floatText(ev, "💤", true);
      return;
    }
    barn.lastPet = now;
    cow.growth = clampGrowth(cow.growth + PET_GAIN);
    floatText(ev, "+" + PET_GAIN + "% 💕", false);
    save(); render();
  }
  function ship(i) {
    var barn = state.barns[i];
    if (!barn || !barn.cow || barn.cow.growth < 100) return;
    var price = shipPriceFor(barn.cow);
    var rar = rarityByKey(barn.cow.rarity);
    state.money += price;
    barn.cow = null;
    save(); render();
    toast(rar.name + "の牛を " + fmt(price) + " G で出荷！ 🎉");
  }
  function buyBarn(i) {
    // 次に増やせるおうちのみ購入可（順番に解放）
    if (i !== state.barns.length || i >= MAX_BARNS) return;
    var price = BARN_PRICES[i-1];
    if (state.money < price) { toast("おさいふが たりないよ 💦"); return; }
    // 詰み防止：購入後の残高が子牛の価格を下回るなら確認する
    if (state.money - price < ADOPT_COST) {
      if (!window.confirm("買うと子牛をお迎えできなくなるかも🐄💦 それでも買う?")) return;
    }
    state.money -= price;
    state.barns.push({ cow:null, lastPet:0 });
    var count = state.barns.length;
    if (checkRelief()) { render(); return; }   // 詰み状態なら即補填し応援金メッセージを優先
    save(); render();
    toast(count + "つ目のおうちを 増やした！ 🏡");
  }

  // ===== 救済（詰み防止）=====
  // 牛が0頭かつ所持金が子牛の価格未満なら「応援金」で補填する（何度でも発動）
  function noCows() {
    for (var i=0;i<state.barns.length;i++){ if (state.barns[i].cow) return false; }
    return true;
  }
  function checkRelief() {
    if (noCows() && state.money < ADOPT_COST) {
      state.money = ADOPT_COST;   // 30,000G まで補填
      save();
      toast("🎁 応援金がとどきました！");
      return true;
    }
    return false;
  }

  // ===== グリッド構築（6スロットを一度だけ生成）=====
  var slots = [];
  function buildGrid() {
    var grid = document.getElementById("grid");
    for (var i=0;i<MAX_BARNS;i++){
      var slot = document.createElement("div");
      slot.className = "slot";

      var top = document.createElement("div"); top.className = "s-top";
      var emoji = document.createElement("div"); emoji.className = "s-emoji";
      var mid = document.createElement("div"); mid.className = "s-mid";
      var bar = document.createElement("div"); bar.className = "s-bar";
      var fill = document.createElement("div"); fill.className = "s-fill";
      bar.appendChild(fill);
      var btn = document.createElement("button"); btn.className = "s-btn"; btn.type = "button";

      slot.appendChild(top); slot.appendChild(emoji); slot.appendChild(mid);
      slot.appendChild(bar); slot.appendChild(btn);
      grid.appendChild(slot);

      (function(idx, btnEl){
        // カード全体をタップ判定に（牛→なでる / 空き→迎える / 次→増やす）
        // click ではなく pointerdown で 300ms 遅延を回避し連打の即応性を上げる。
        // ボタン上のタップはボタン側で処理するため除外（二重発火防止）。
        slot.addEventListener("pointerdown", function(ev){
          if (btnEl.contains(ev.target)) return;
          handleCardTap(idx, ev);
        });
        // ボタンは専用動作（出荷等の確定操作なので click のまま）。
        btn.addEventListener("click", function(ev){ handleButton(idx, ev); });
      })(i, btn);

      slots.push({ slot:slot, top:top, emoji:emoji, mid:mid, bar:bar, fill:fill, btn:btn });
    }
  }

  // なで判定領域：牛の絵文字を中心に、絵文字サイズの約1.5倍の円内だけ反応
  function withinPetZone(i, ev) {
    if (ev.clientX == null) return true;   // 座標が取れない場合は許可
    var r = slots[i].emoji.getBoundingClientRect();
    var cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    var radius = Math.max(r.width, r.height) * 0.75;   // 直径 ≒ 絵文字の1.5倍
    var dx = ev.clientX - cx, dy = ev.clientY - cy;
    return (dx * dx + dy * dy) <= radius * radius;
  }
  // カードタップ：牛→(絵文字周辺のみ)なでる / 空き→迎える / 次の未解放→増やす
  function handleCardTap(i, ev) {
    var n = state.barns.length;
    if (i < n) {
      if (state.barns[i].cow) { if (withinPetZone(i, ev)) petAt(i, ev); }  // テキスト・余白は無反応
      else adopt(i);
    } else if (i === n) buyBarn(i);
  }
  // ボタン：牛(完成)→出荷 / 空き→迎える / 次の未解放→増やす（育て中ボタンのなで反応は無し）
  function handleButton(i, ev) {
    var n = state.barns.length;
    if (i < n) {
      var cow = state.barns[i].cow;
      if (cow) { if (cow.growth >= 100) ship(i); }   // 育て中は非活性・なで無効
      else adopt(i);
    } else if (i === n) buyBarn(i);
  }

  // ===== 表示更新 =====
  function updateSlot(i) {
    var s = slots[i];
    var n = state.barns.length;

    if (i < n) {
      var barn = state.barns[i];
      s.slot.className = "slot";
      s.slot.style.cursor = "pointer";
      if (barn.cow) {
        var rar = rarityByKey(barn.cow.rarity);
        var g = Math.min(100, barn.cow.growth);
        var st = growthStage(g);
        var ready = g >= 100;

        s.top.className = "s-top";
        s.top.textContent = st.name;

        // 絵文字を一回り大きく（頭上の演出が指で隠れないサイズ感）
        s.emoji.className = "s-emoji tap";
        s.emoji.style.fontSize = st.small ? "62px" : "76px";
        s.emoji.textContent = st.small ? rar.face : rar.faceBig;

        s.mid.className = "s-mid " + rar.cls;
        s.mid.textContent = (rar.star ? rar.star + " " : "") + rar.name + "（×" + rar.mult.toFixed(1) + "）";

        s.bar.className = "s-bar";
        s.fill.style.width = g + "%";

        // 出荷は完成時のみ。育て中ボタンは非活性（なで無効）
        s.btn.className = "s-btn ship";
        s.btn.disabled = !ready;
        s.btn.textContent = ready ? ("出荷 " + fmt(shipPriceFor(barn.cow)) + "G")
                                  : ("育て中 " + Math.floor(g) + "%");
      } else {
        // 空きおうち → 「＋」で迎える
        s.top.className = "s-top muted";
        s.top.textContent = "あきべや";
        s.emoji.className = "s-emoji plus";
        s.emoji.style.fontSize = "56px";
        s.emoji.textContent = "＋";
        s.mid.className = "s-mid plain";
        s.mid.textContent = "子牛を迎えよう";
        s.bar.className = "s-bar hidden";
        s.fill.style.width = "0%";
        s.btn.className = "s-btn adopt";
        s.btn.disabled = false;   // 不足時は adopt() がトーストで案内
        s.btn.textContent = "迎える " + fmt(ADOPT_COST) + "G";
      }
    } else if (i === n && i < MAX_BARNS) {
      // 次に増やせるおうち（🔒＋価格・購入可）
      var price = BARN_PRICES[i-1];
      s.slot.className = "slot locked";
      s.slot.style.cursor = "pointer";
      s.top.className = "s-top muted";
      s.top.textContent = "おうちを増やす";
      s.emoji.className = "s-emoji plus";
      s.emoji.style.fontSize = "44px";
      s.emoji.textContent = "🔒";
      s.mid.className = "s-mid plain";
      s.mid.textContent = "ここを増やせる";
      s.bar.className = "s-bar hidden";
      s.fill.style.width = "0%";
      s.btn.className = "s-btn buy";
      s.btn.disabled = false;   // 不足時は buyBarn() がトーストで案内
      s.btn.textContent = "増やす " + fmt(price) + "G";
    } else {
      // まだ増やせないおうち（🔒＋価格・非活性）
      var price2 = BARN_PRICES[i-1];
      s.slot.className = "slot locked";
      s.slot.style.cursor = "default";
      s.top.className = "s-top muted";
      s.top.textContent = "みかいほう";
      s.emoji.className = "s-emoji lock";
      s.emoji.style.fontSize = "44px";
      s.emoji.textContent = "🔒";
      s.mid.className = "s-mid plain";
      s.mid.textContent = "じゅんばんに増える";
      s.bar.className = "s-bar hidden";
      s.fill.style.width = "0%";
      s.btn.className = "s-btn";
      s.btn.disabled = true;
      s.btn.textContent = "🔒 " + fmt(price2) + "G";
    }
  }

  var moneyEl = document.getElementById("money");
  var seriEl = document.getElementById("seri");
  function render() {
    moneyEl.textContent = fmt(state.money) + " G";
    seriEl.textContent = "今日のセリ：" + seriLabel(state.seriFactor) + "（×" + state.seriFactor.toFixed(2) + "）";
    for (var i=0;i<MAX_BARNS;i++) updateSlot(i);
  }

  // ===== 成長：時刻差分ベースで全おうちの牛に適用 =====
  function applyGrowth(now) {
    now = now || Date.now();
    var base = (typeof state.lastUpdate === "number") ? state.lastUpdate : now;
    var delta = now - base;
    if (delta < 0) delta = 0;                 // 時計巻き戻しは0扱い
    var seconds = delta / 1000;
    if (seconds > 0) {
      for (var i=0;i<state.barns.length;i++){
        var cow = state.barns[i].cow;
        if (!cow || cow.growth >= 100) continue;
        var mult = rarityByKey(cow.rarity).mult;
        cow.growth = clampGrowth(cow.growth + (100 / GROW_SECONDS) * mult * seconds);
      }
    }
    state.lastUpdate = now;
  }

  // ===== ゲームループ（1秒tick）＝ 差分適用＋描画 =====
  function tick() {
    refreshSeri();
    applyGrowth(Date.now());
    checkRelief();   // 詰み状態を検知したら応援金で補填
    render();
    save();
  }
  var tickTimer = null;
  function startLoop(){ if (!tickTimer) tickTimer = setInterval(tick, 1000); }
  function stopLoop(){ if (tickTimer) { clearInterval(tickTimer); tickTimer = null; } }

  // ===== おかえり表示（読込・タブ復帰時）=====
  var welcomeEl = document.getElementById("welcome");
  var wAway = document.getElementById("wAway");
  var wLines = document.getElementById("wLines");
  document.getElementById("wClose").addEventListener("click", function(){ welcomeEl.hidden = true; });

  function awayLabel(ms) {
    var min = Math.floor(ms / 60000);
    if (min < 60) return min + "分ぶり";
    var hr = Math.floor(min / 60);
    if (hr < 24) return hr + "時間ぶり";
    return Math.floor(hr / 24) + "日ぶり";
  }
  function showWelcome(awayMs, newlyShippable, grownCount, totalGain) {
    wAway.textContent = awayLabel(awayMs);
    var lines = [];
    if (newlyShippable > 0) lines.push("🎀 出荷できるようになった子：" + newlyShippable + "頭");
    if (grownCount > 0) lines.push("🌱 育った子：" + grownCount + "頭（あわせて +" + Math.round(totalGain) + "%）");
    wLines.innerHTML = "";
    for (var i=0;i<lines.length;i++){
      var d = document.createElement("div");
      d.className = "modal-line";
      d.textContent = lines[i];
      wLines.appendChild(d);
    }
    welcomeEl.hidden = false;
  }
  // 差分を適用しつつ、離席60秒以上かつ変化があれば「おかえり」を表示
  function processReturn() {
    refreshSeri();
    var now = Date.now();
    var awayMs = now - ((typeof state.lastUpdate === "number") ? state.lastUpdate : now);
    if (awayMs < 0) awayMs = 0;
    // 適用前をスナップショット（変化計測用）
    var snap = [];
    for (var i=0;i<state.barns.length;i++){
      var c = state.barns[i].cow;
      snap.push(c ? { g: c.growth, shippable: c.growth >= 100 } : null);
    }
    applyGrowth(now);
    var newlyShippable = 0, grownCount = 0, totalGain = 0;
    for (var j=0;j<state.barns.length;j++){
      var cow = state.barns[j].cow, sp = snap[j];
      if (!cow || !sp) continue;
      var gain = cow.growth - sp.g;
      if (gain >= 1) { grownCount++; totalGain += gain; }
      if (!sp.shippable && cow.growth >= 100) newlyShippable++;
    }
    if (awayMs >= 60000 && (grownCount > 0 || newlyShippable > 0)) {
      showWelcome(awayMs, newlyShippable, grownCount, totalGain);
    }
    checkRelief();
    render();
    save();
  }

  // ===== iOS Safari 向け：ダブルタップ／ピンチズームの確実な抑止 =====
  // touch-action CSS が実機で効かないケースの保険。ゲームは単一ページのため
  // ページ内ズームを無効化する（OSの画面ズームで代替可能）。
  function installZoomGuards() {
    var lastTouchEnd = 0;
    document.addEventListener("touchend", function(e){
      // 活性ボタン上のタップのみ除外（確定操作の click を殺さない）。
      // disabled な「育て中」ボタンは抜け道になるので抑止対象に含める。
      var btn = e.target && e.target.closest ? e.target.closest(".s-btn") : null;
      if (btn && !btn.disabled) { lastTouchEnd = Date.now(); return; }
      var now = Date.now();
      if (now - lastTouchEnd < 350) e.preventDefault();   // 直前タップから350ms未満=ダブルタップ
      lastTouchEnd = now;
    }, { passive: false });
    // iOS独自のピンチズームイベントを無効化
    document.addEventListener("gesturestart",  function(e){ e.preventDefault(); });
    document.addEventListener("gesturechange", function(e){ e.preventDefault(); });
    document.addEventListener("gestureend",    function(e){ e.preventDefault(); });
  }

  // ===== 初期化 =====
  load();
  buildGrid();
  installZoomGuards();
  processReturn();          // 読込時：オフライン分を反映し、必要ならおかえり表示
  startLoop();              // モーダル表示中もループは止めない

  // タブ非表示→復帰でも「おかえり」を発火（復帰時に差分をまとめて反映）
  document.addEventListener("visibilitychange", function(){
    if (document.visibilityState === "visible") { processReturn(); startLoop(); }
    else { stopLoop(); }
  });
})();
</script>
</body>
</html>
